<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#090A14',
              card: '#13152A',
              border: '#1E2138',
              muted: '#2A2D47',
            },
            primary: '#DF6B33',
            primaryHover: '#C85A27',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #090A14; }
    input::placeholder, select::placeholder, textarea::placeholder { color: #4B5275; }
    input:focus, select:focus, textarea:focus { outline: none; }
    .social-btn:hover { background-color: #1A1D33; }
    .input-error { border-color: #EF4444 !important; }
    .input-success { border-color: #22C55E !important; }
    .error-msg {
      display: none;
      font-size: 0.75rem;
      margin-top: 0.375rem;
      color: #EF4444;
    }
    .error-msg.show { display: block; }
    .gender-btn.active {
      border-color: #DF6B33 !important;
      background-color: rgba(223, 107, 51, 0.15) !important;
      color: #DF6B33 !important;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10 font-inter">

  <!-- Background decoration -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full opacity-10" style="background: radial-gradient(circle, #DF6B33, transparent 70%);"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full opacity-5" style="background: radial-gradient(circle, #DF6B33, transparent 70%);"></div>
  </div>

  <!-- Register Card -->
  <div class="relative w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-4" style="background-color: #DF6B33;">
        <i data-lucide="user-plus" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="font-poppins text-2xl font-extrabold text-white tracking-tight">Create Account</h1>
      <p class="text-gray-400 text-sm mt-1 font-inter">Join us and start your journey</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl p-8" style="background-color: #13152A; border: 1px solid #1E2138;">

      <!-- Full Name -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2 font-inter">Full Name <span style="color: #EF4444;">*</span></label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <i data-lucide="user" class="w-4 h-4"></i>
          </span>
          <input
            type="text"
            id="fullname"
            placeholder="John Doe"
            class="w-full pl-11 pr-4 py-3 rounded-xl text-sm text-white transition-all duration-200"
            style="background-color: #1A1D33; border: 1px solid #1E2138;"
          />
          <p class="error-msg" id="fullnameError"></p>
        </div>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2 font-inter">Email Address</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <i data-lucide="mail" class="w-4 h-4"></i>
          </span>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            class="w-full pl-11 pr-4 py-3 rounded-xl text-sm text-white transition-all duration-200"
            style="background-color: #1A1D33; border: 1px solid #1E2138;"
          />
          <p class="error-msg" id="emailError"></p>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2 font-inter">Password</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <i data-lucide="lock" class="w-4 h-4"></i>
          </span>
          <input
            type="password"
            id="password"
            placeholder="Create a password"
            class="w-full pl-11 pr-11 py-3 rounded-xl text-sm text-white transition-all duration-200"
            style="background-color: #1A1D33; border: 1px solid #1E2138;"
          />
          <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors cursor-pointer">
            <i data-lucide="eye-off" class="w-4 h-4" id="eyeIcon"></i>
          </button>
          <p class="error-msg" id="passwordError"></p>
        </div>
      </div>

      <!-- Gender -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2 font-inter">Gender</label>
        <div class="flex gap-2" id="genderGroup">
          <button type="button" data-gender="male" class="gender-btn flex-1 flex items-center justify-center gap-2 py-3 rounded-full border text-sm font-medium font-inter transition-all duration-200 cursor-pointer" style="border-color: #1E2138; background-color: #1A1D33; color: #9CA3AF;">
            <i data-lucide="user" class="w-4 h-4"></i>
            Male
          </button>
          <button type="button" data-gender="female" class="gender-btn flex-1 flex items-center justify-center gap-2 py-3 rounded-full border text-sm font-medium font-inter transition-all duration-200 cursor-pointer" style="border-color: #1E2138; background-color: #1A1D33; color: #9CA3AF;">
            <i data-lucide="heart" class="w-4 h-4"></i>
            Female
          </button>
          <button type="button" data-gender="other" class="gender-btn flex-1 flex items-center justify-center gap-2 py-3 rounded-full border text-sm font-medium font-inter transition-all duration-200 cursor-pointer" style="border-color: #1E2138; background-color: #1A1D33; color: #9CA3AF;">
            <i data-lucide="diversity-3" class="w-4 h-4"></i>
            Other
          </button>
        </div>
      </div>

      <!-- Address -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2 font-inter">Address</label>
        <div class="relative">
          <span class="absolute left-4 top-3 text-gray-500">
            <i data-lucide="map-pin" class="w-4 h-4"></i>
          </span>
          <textarea
            id="address"
            rows="2"
            placeholder="123 Main St, City, Country"
            class="w-full pl-11 pr-4 py-3 rounded-xl text-sm text-white transition-all duration-200 resize-none"
            style="background-color: #1A1D33; border: 1px solid #1E2138;"
          ></textarea>
        </div>
      </div>

      <!-- Phone -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2 font-inter">Phone Number</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
            <i data-lucide="phone" class="w-4 h-4"></i>
          </span>
          <input
            type="tel"
            id="phone"
            placeholder="+1 234 567 890"
            class="w-full pl-11 pr-4 py-3 rounded-xl text-sm text-white transition-all duration-200"
            style="background-color: #1A1D33; border: 1px solid #1E2138;"
          />
        </div>
      </div>

      <!-- Terms -->
      <div class="flex items-start gap-2 mb-6">
        <input type="checkbox" id="terms" class="w-4 h-4 rounded mt-0.5 cursor-pointer flex-shrink-0" style="accent-color: #DF6B33;">
        <label for="terms" class="text-sm text-gray-400 font-inter leading-snug cursor-pointer">I agree to the <a href="#" class="font-medium" style="color: #DF6B33;">Terms of Service</a> and <a href="#" class="font-medium" style="color: #DF6B33;">Privacy Policy</a></label>
      </div>

      <!-- Submit -->
      <button
        type="button"
        id="registerBtn"
        class="w-full py-3 rounded-full text-white text-sm font-semibold font-poppins tracking-wide transition-all duration-200 cursor-pointer shadow-lg"
        style="background-color: #DF6B33;"
        onmouseover="this.style.backgroundColor='#C85A27'; this.style.boxShadow='0 0 20px rgba(223,107,51,0.5)';"
        onmouseout="this.style.backgroundColor='#DF6B33'; this.style.boxShadow='0 4px 12px rgba(0,0,0,0.3)';"
      >
        Create Account
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px" style="background-color: #1E2138;"></div>
        <span class="text-xs text-gray-500 font-inter">or sign up with</span>
        <div class="flex-1 h-px" style="background-color: #1E2138;"></div>
      </div>

      <!-- Social Register -->
      <div class="flex flex-col gap-3">
        <!-- Google -->
        <button type="button" aria-label="Sign up with Google" class="social-btn flex items-center justify-center gap-3 py-3 rounded-full border transition-all duration-200 cursor-pointer font-inter text-sm font-medium text-gray-300" style="border-color: #1E2138; background-color: #1A1D33;">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>

        <!-- GitHub -->
        <button type="button" aria-label="Sign up with GitHub" class="social-btn flex items-center justify-center gap-3 py-3 rounded-full border transition-all duration-200 cursor-pointer font-inter text-sm font-medium text-gray-300" style="border-color: #1E2138; background-color: #1A1D33;">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#E8EAF0">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </button>

        <!-- Facebook -->
        <button type="button" aria-label="Sign up with Facebook" class="social-btn flex items-center justify-center gap-3 py-3 rounded-full border transition-all duration-200 cursor-pointer font-inter text-sm font-medium text-gray-300" style="border-color: #1E2138; background-color: #1A1D33;">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebook
        </button>
      </div>

    </div>

    <!-- Back to login -->
    <p class="text-center text-sm text-gray-500 mt-6 font-inter">
      Already have an account?
      <a href="login.html" class="font-medium transition-colors duration-200" style="color: #DF6B33;" onmouseover="this.style.color='#C85A27'" onmouseout="this.style.color='#DF6B33'">Sign in</a>
    </p>

  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    const fullnameInput = document.getElementById('fullname');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const fullnameError = document.getElementById('fullnameError');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // Gender button selection
    const genderBtns = document.querySelectorAll('.gender-btn');
    genderBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        genderBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    function showError(input, errorEl, message) {
      input.classList.add('input-error');
      input.classList.remove('input-success');
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }

    function showSuccess(input, errorEl) {
      input.classList.remove('input-error');
      input.classList.add('input-success');
      errorEl.classList.remove('show');
    }

    function clearState(input, errorEl) {
      input.classList.remove('input-error', 'input-success');
      errorEl.classList.remove('show');
    }

    // Blur validation for full name (required)
    fullnameInput.addEventListener('blur', () => {
      if (!fullnameInput.value.trim()) {
        showError(fullnameInput, fullnameError, 'Full name is required.');
      } else {
        showSuccess(fullnameInput, fullnameError);
      }
    });
    fullnameInput.addEventListener('input', () => {
      if (fullnameInput.classList.contains('input-error') || fullnameInput.classList.contains('input-success')) {
        clearState(fullnameInput, fullnameError);
      }
    });

    // Blur validation for email (optional but must be valid if filled)
    emailInput.addEventListener('blur', () => {
      const val = emailInput.value.trim();
      if (val && !emailRegex.test(val)) {
        showError(emailInput, emailError, 'Please enter a valid email address.');
      } else {
        clearState(emailInput, emailError);
      }
    });
    emailInput.addEventListener('input', () => {
      if (emailInput.classList.contains('input-error') || emailInput.classList.contains('input-success')) {
        clearState(emailInput, emailError);
      }
    });

    // Blur validation for password (optional but min length if filled)
    passwordInput.addEventListener('blur', () => {
      const val = passwordInput.value;
      if (val && val.length < 6) {
        showError(passwordInput, passwordError, 'Password must be at least 6 characters.');
      } else {
        clearState(passwordInput, passwordError);
      }
    });
    passwordInput.addEventListener('input', () => {
      if (passwordInput.classList.contains('input-error') || passwordInput.classList.contains('input-success')) {
        clearState(passwordInput, passwordError);
      }
    });

    // Toggle password visibility
    const toggleBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.setAttribute('data-lucide', isPassword ? 'eye' : 'eye-off');
      lucide.createIcons();
    });

    // Register button action
    const registerBtn = document.getElementById('registerBtn');
    registerBtn.addEventListener('click', () => {
      const nameVal = fullnameInput.value.trim();
      const emailVal = emailInput.value.trim();
      const passwordVal = passwordInput.value;
      const termsChecked = document.getElementById('terms').checked;

      let valid = true;

      if (!nameVal) {
        showError(fullnameInput, fullnameError, 'Full name is required.');
        valid = false;
      } else {
        showSuccess(fullnameInput, fullnameError);
      }

      if (emailVal && !emailRegex.test(emailVal)) {
        showError(emailInput, emailError, 'Please enter a valid email address.');
        valid = false;
      } else {
        clearState(emailInput, emailError);
      }

      if (passwordVal && passwordVal.length < 6) {
        showError(passwordInput, passwordError, 'Password must be at least 6 characters.');
        valid = false;
      } else {
        clearState(passwordInput, passwordError);
      }

      if (!termsChecked) {
        alert('Please agree to the Terms of Service and Privacy Policy.');
        return;
      }

      if (valid) {
        alert('Account created successfully!');
      }
    });
  </script>

</body>
</html>
